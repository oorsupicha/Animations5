<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Studio_BadlandS — Animation Catalog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1a1a;color:#e0e0e0;display:flex;height:100vh;overflow:hidden}
#sidebar{width:170px;min-width:170px;background:#111;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #333}
#sidebar h2{padding:14px 12px 4px;font-size:13px;color:#888;text-transform:uppercase;letter-spacing:1px;border-bottom:none}
#version{padding:2px 12px 8px;font-size:10px;color:#3d3d3d;border-bottom:1px solid #222;letter-spacing:0.5px}
.nav-btn{display:block;width:100%;padding:9px 14px;text-align:left;background:none;border:none;color:#ccc;cursor:pointer;font-size:12.5px;border-left:3px solid transparent;transition:background 0.15s}
.nav-btn:hover{background:#1e1e1e;color:#fff}
.nav-btn.active{background:#1e2a3a;color:#4da6ff;border-left-color:#4da6ff;font-weight:600}
.nav-section{padding:8px 12px 4px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#141414;padding:10px 16px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#topbar h1{font-size:15px;color:#fff;margin-right:10px;white-space:nowrap}
.filter-input{background:#222;border:1px solid #444;color:#e0e0e0;padding:5px 10px;border-radius:4px;font-size:12px;width:160px}
.filter-input::placeholder{color:#555}
.filter-input:focus{outline:none;border-color:#4da6ff}
.btn-group{display:flex;gap:4px}
.filt-btn{background:#222;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;transition:all 0.15s}
.filt-btn:hover{background:#2a2a2a;color:#fff}
.filt-btn.active{background:#1e3a5f;border-color:#4da6ff;color:#4da6ff}
.filt-btn.blend-btn.active{background:#2a1e3a;border-color:#a060f0;color:#c080ff}
#content{flex:1;overflow-y:auto;padding:16px}
.anim-table{width:100%;border-collapse:collapse;font-size:12px}
.anim-table th{background:#1e1e1e;color:#888;padding:7px 12px;text-align:left;border-bottom:2px solid #333;position:sticky;top:0;z-index:1;white-space:nowrap}
.anim-table td{padding:6px 12px;border-bottom:1px solid #222;color:#ccc}
.anim-table tr:hover td{background:#1e1e1e}
.section-header{background:#0d1e2e;color:#4da6ff;padding:8px 12px;font-size:12px;font-weight:600;border-bottom:1px solid #1a3a55;user-select:none}
.section-header:hover{background:#112233}
.badge{display:inline-block;background:#1e3a5f;color:#7ab8f5;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:6px}
#summary-view{overflow:auto}
#summary-view h2{font-size:14px;color:#aaa;margin-bottom:10px}
.sum-table{border-collapse:collapse;font-size:11px;white-space:nowrap}
.sum-table th{background:#1e1e1e;color:#888;padding:6px 10px;border:1px solid #2a2a2a;text-align:center}
.sum-table th.row-header{text-align:left;min-width:90px;position:sticky;left:0;z-index:2;background:#1e1e1e}
.sum-table th.col-header{writing-mode:vertical-lr;transform:rotate(180deg);height:100px;vertical-align:bottom;padding:4px 6px;font-size:10px}
.sum-table td{border:1px solid #2a2a2a;text-align:center;padding:3px 6px}
.sum-table td.row-header{text-align:left;background:#181818;color:#bbb;font-weight:600;position:sticky;left:0;z-index:1}
.sum-table td.cell-0{color:#333}
.sum-table td.cell-pos{background:#0d2a1a;color:#4ecb71}
.sum-table td.cell-fb{background:#1a1200;color:#f0b060}
.sum-table td.cell-ub{background:#001a10;color:#50e0a0}
.sum-table td.cell-al{background:#1a0a1a;color:#c060f0}
.stat-bar{display:flex;gap:16px;padding:0 0 12px;flex-wrap:wrap}
.stat{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:8px 14px;font-size:12px}
.stat span{color:#4da6ff;font-weight:600;font-size:16px;display:block}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}
</style>
</head>

  </div>
  <div id="content"></div>
</div>

function showPanel(panel){

}

function getFiltered(data,isW){

    if(isW&&filterBlending!=='All'&&e.blending!==filterBlending)return false;
    if(nq&&e.file.toLowerCase().indexOf(nq)<0)return false;

    return true;
  });
}

  WEAPON_ORDER.forEach(function(w){
    h+='<tr><td class="row-header">'+esc(w)+'</td>';
    ALL_USING_WEAPON.forEach(function(u){
      var v=SUMMARY_ROWS[w][u]||0;
      h+='<td class="'+(v>0?"cell-pos":"cell-0")+'">'+(v>0?v:"")+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';

  h+='<h2>Non-Weapon Using Distribution</h2>';
  var nc={};
  NW_DATA.forEach(function(e){nc[e.using]=(nc[e.using]||0)+1;});
  var ns=Object.entries(nc).sort(function(a,b){return b[1]-a[1];});
  h+='<table class="sum-table"><thead><tr><th class="row-header">Using Situation</th><th>Count</th></tr></thead><tbody>';
  ns.forEach(function(x){h+='<tr><td class="row-header">'+esc(x[0])+'</td><td class="cell-pos">'+x[1]+'</td></tr>';});
  h+='</tbody></table></div>';
  content.innerHTML=h;
}

function renderDetailView(content,data,isW){
  var groups={};
  data.forEach(function(e){if(!groups[e.using])groups[e.using]=[];groups[e.using].push(e);});
  var gkeys=Object.keys(groups).sort();
  var cols=isW?5:4;

  var h='<div class="stat-bar">';
  h+='<div class="stat"><span>'+data.length+'</span>Files shown</div>';
  h+='<div class="stat"><span>'+gkeys.length+'</span>Using categories</div>';
  if(isW){
    var bc={};
    data.forEach(function(e){bc[e.blending]=(bc[e.blending]||0)+1;});
    BLENDING_TYPES.forEach(function(b){
      if(bc[b])h+='<div class="stat"><span style="color:'+blendColor(b)+'">'+bc[b]+'</span>'+esc(b)+'</div>';
    });
  }
  h+='</div>';

  if(!data.length){
    h+='<p style="color:#555;padding:20px">No animations match the current filters.</p>';
    content.innerHTML=h;return;
  }

  h+='<table class="anim-table"><thead><tr>';
  h+='<th>File Name</th><th>Using</th>';
  if(isW)h+='<th>Blending</th>';
  h+='<th>Stance</th><th>Perspective</th></tr></thead><tbody>';

  gkeys.forEach(function(using){
    var rows=groups[using];
    h+='<tr><td colspan="'+cols+'" class="section-header">▸ '+esc(using)+'<span class="badge">'+rows.length+'</span></td></tr>';
    rows.forEach(function(e){
      h+='<tr>';
      h+='<td style="font-family:monospace;color:#a0c4ff">'+esc(e.file)+'</td>';
      h+='<td style="color:#c8a0e8">'+esc(e.using)+'</td>';
      if(isW)h+='<td><span style="font-weight:600;color:'+blendColor(e.blending)+'">'+esc(e.blending)+'</span></td>';
      h+='<td><span style="color:'+stanceColor(e.stance)+'">'+esc(e.stance)+'</span></td>';
      h+='<td><span style="color:'+perspColor(e.persp)+'">'+esc(e.persp)+'</span></td>';
      h+='</tr>';
    });
  });
  h+='</tbody></table>';
  content.innerHTML=h;
}

function blendColor(b){return b==='Full Body'?'#f0b060':b==='Upper Body'?'#50e0a0':'#c060f0';}
function stanceColor(s){return s==='Stand'?'#7dde92':s==='Crouch'?'#f0c060':'#f08060';}
function perspColor(p){return p==='1st Person'?'#60b0f0':'#f07060';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Enter key on search inputs: prevent default page navigation and run filter
document.querySelectorAll('.filter-input').forEach(function(inp){
  inp.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); applyFilters(); }
  });
});

showPanel('__summary__');

</script>
</body>
</html>
